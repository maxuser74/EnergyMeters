<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafici gruppi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/vendor/chart.umd.js"></script>
    <script>
        if (typeof Chart === 'undefined') {
            const fallback = document.createElement('script');
            fallback.src = 'https://cdn.jsdelivr.net/npm/chart.js';
            document.head.appendChild(fallback);
        }
    </script>
    <style>
        :root {
            --bg: #0c1218;
            --panel: #111a22;
            --card: #15212c;
            --accent: #7dd3fc;
            --accent-2: #a78bfa;
            --muted: #7a8b9b;
            --text: #e7eef5;
            --border: #1f2c38;
        }
        * { box-sizing: border-box; }
        html, body {
            height: 100%;
        }
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 25% 20%, rgba(127, 219, 255, 0.05), transparent 35%),
                        radial-gradient(circle at 80% 0%, rgba(167, 139, 250, 0.08), transparent 30%),
                        var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
        }
        .page {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 16px 14px 22px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .content {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1 1 auto;
            min-height: 0;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }
        .title-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .eyebrow {
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }
        h1 {
            margin: 0;
            font-size: 30px;
            font-weight: 600;
            color: var(--text);
        }
        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }
        .status-box {
            background: linear-gradient(120deg, rgba(125, 211, 252, 0.15), rgba(167, 139, 250, 0.12));
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 10px;
            min-width: 220px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .back-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .status-main {
            font-weight: 600;
            font-size: 15px;
        }
        .status-meta {
            color: var(--muted);
            font-size: 12px;
            margin-top: 4px;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
            flex: 1 1 38vh;
            min-height: 200px;
            overflow: auto;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .control {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-size: 13px;
            color: var(--muted);
        }
        select {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
        }
        .pill-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .pill {
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            padding: 8px 10px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .pill.active {
            border-color: rgba(125, 211, 252, 0.5);
            box-shadow: 0 0 0 2px rgba(125, 211, 252, 0.15);
            background: linear-gradient(120deg, rgba(125, 211, 252, 0.12), rgba(167, 139, 250, 0.08));
        }
        .pill small {
            color: var(--muted);
            margin-left: 6px;
        }
        .chart-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
            flex: 1 1 50vh;
            min-height: 260px;
            display: flex;
            flex-direction: column;
        }
        #groupChart {
            width: 100%;
            height: 55vh;
            max-height: 70vh;
            min-height: 260px;
            display: block;
        }
        .chart-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }
        .chart-title {
            font-weight: 600;
            font-size: 16px;
        }
        .chart-subtitle {
            color: var(--muted);
            font-size: 13px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .card.inactive {
            opacity: 0.5;
            border-color: #2a3744;
        }
        .card h3 {
            margin: 0;
            font-size: 14px;
            color: var(--text);
        }
        .card small {
            color: var(--muted);
        }
        .value {
            font-size: 22px;
            font-weight: 600;
            margin-top: 8px;
            color: var(--accent);
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            background: rgba(125, 211, 252, 0.14);
            color: var(--accent);
            margin-left: 6px;
        }
        .empty {
            color: var(--muted);
            font-size: 14px;
            text-align: center;
            padding: 20px 0;
        }
        @media (min-width: 700px) {
            .controls {
                grid-template-columns: 280px 1fr;
                align-items: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-bar">
            <div class="title-wrap">
                <h1 style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                    Grafici gruppi:
                    <span id="groupLabel">Compressori</span>
                    <select id="groupSelect" style="background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; outline: none; min-width: 180px;"></select>
                    <a class="back-link" href="/index.html">&#8592; Torna alla dashboard</a>
                </h1>
            </div>
            <div class="status-box">
                <div id="statusText" class="status-main">Connecting...</div>
                <div id="statusMeta" class="status-meta">waiting for data</div>
            </div>
        </div>

        <div class="content">
            <div class="chart-card">
                <div class="chart-head">
                    <div>
                        <div class="chart-title">Power consumption</div>
                        <div class="chart-subtitle">kW over the last minutes</div>
                    </div>
                    <div class="chart-subtitle" id="sampleInfo"></div>
                </div>
                <canvas id="groupChart"></canvas>
            </div>

            <div class="panel">
                <div class="chart-head" style="margin-bottom: 12px;">
                    <div class="chart-title">Latest readings</div>
                    <div class="chart-subtitle">Live values from the selected group</div>
                </div>
                <div id="cards" class="cards"></div>
                <div id="emptyState" class="empty" style="display:none;">No machines found for this group.</div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const DEFAULT_GROUP = 'Compressori';
        const MAX_POINTS = 480;
        let CHART_HEIGHT = 280;
        const TOTAL_STACK_ID = 'TOTAL_STACK';
        const palette = ['#7dd3fc', '#a78bfa', '#f472b6', '#facc15', '#34d399', '#60a5fa', '#f97316'];
        const gradientPairs = [
            ['#a5e3ff', '#2193ff'],
            ['#cbb8ff', '#6b21ff'],
            ['#f9b8d9', '#db2777'],
            ['#fde68a', '#d97706'],
            ['#9ae6b4', '#0d9488'],
            ['#a5bff9', '#1d4ed8'],
            ['#ffb38a', '#ea580c'],
            ['#c7f9cc', '#16a34a'] // total stack line
        ];

        const socket = io();
        const state = {
            group: DEFAULT_GROUP,
            utilities: [],
            registers: [],
            powerRegister: null,
            timeline: [],
            history: {},
            selected: new Set(),
            chart: null,
            selectionInitialized: false
        };

        const els = {
            groupSelect: document.getElementById('groupSelect'),
            groupLabel: document.getElementById('groupLabel'),
            statusText: document.getElementById('statusText'),
            statusMeta: document.getElementById('statusMeta'),
            cards: document.getElementById('cards'),
            empty: document.getElementById('emptyState'),
            sampleInfo: document.getElementById('sampleInfo')
        };

        function formatKw(value) {
            if (value === null || value === undefined || isNaN(value)) return '-';
            return `${value.toFixed(2)} kW`;
        }

        function setStatus(text, meta) {
            els.statusText.textContent = text;
            els.statusMeta.textContent = meta || '';
        }

        function findPowerRegister(registers) {
            return registers.find(r => r.label === 'kW' || r.label === 'W' || r.label === 'Active Power W') || null;
        }

        function ensureHistory(utilId) {
            if (!state.history[utilId]) {
                state.history[utilId] = [];
            }
            // Pad to current timeline length for alignment
            while (state.history[utilId].length < state.timeline.length - 1) {
                state.history[utilId].push(null);
            }
            return state.history[utilId];
        }

        function pushDataForGroup(latestResults) {
            if (!state.utilities.length || !state.powerRegister) return;
            const now = Date.now();
            state.timeline.push(now);
            if (state.timeline.length > MAX_POINTS) {
                state.timeline.shift();
                Object.values(state.history).forEach(arr => arr.shift());
            }

            state.utilities.forEach(util => {
                const arr = ensureHistory(util.id);
                const res = latestResults[util.id];
                const val = res && res.values ? res.values[state.powerRegister.startAddress] : null;
                arr.push(val !== undefined ? val : null);
                if (arr.length > state.timeline.length) arr.shift();
            });

            els.sampleInfo.textContent = `${state.timeline.length} samples`;
        }

        function buildChart() {
            if (state.chart || typeof Chart === 'undefined') return;
            const canvas = document.getElementById('groupChart');
            const ctx = canvas.getContext('2d');
            state.chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { ticks: { color: '#9fb1c3' }, grid: { color: '#1f2c38' }, stacked: false },
                        y: { ticks: { color: '#9fb1c3' }, grid: { color: '#1f2c38' }, beginAtZero: true, stacked: false }
                    },
                    plugins: {
                        legend: { labels: { color: '#e7eef5' } },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: (ctx) => `${ctx.dataset.label}: ${formatKw(ctx.raw)}`
                            }
                        }
                    }
                }
            });
        }

        function renderChart() {
            if (!state.chart || !state.timeline.length) return;
            // Keep canvas height aligned to layout
            adjustChartHeight();
            const labels = state.timeline.map(ts => new Date(ts).toLocaleTimeString());
            const datasets = [];
            const ctx = state.chart.ctx || state.chart.canvas.getContext('2d');
            const chartArea = state.chart.chartArea;
            const gradientHeight = chartArea ? chartArea.bottom - chartArea.top : (state.chart.canvas?.height || 300);
            const getGradient = (idx) => {
                if (!ctx) return palette[idx % palette.length];
                const g = ctx.createLinearGradient(0, 0, 0, gradientHeight);
                const pair = gradientPairs[idx % gradientPairs.length];
                g.addColorStop(0, pair[0]);
                g.addColorStop(1, pair[1]);
                return g;
            };
            state.utilities.forEach((util, idx) => {
                if (!state.selected.has(util.id)) return;
                const data = state.history[util.id] || [];
                const gradient = getGradient(idx);
                datasets.push({
                    label: util.name,
                    data,
                    borderColor: gradient,
                    backgroundColor: gradient,
                    borderWidth: 2,
                    pointRadius: 0,
                    spanGaps: true,
                    tension: 0.35,
                    fill: false
                });
            });
            if (state.selected.has(TOTAL_STACK_ID) && state.selected.size) {
                const totalData = state.timeline.map((_, i) => {
                    let sum = 0;
                    let has = false;
                    state.utilities.forEach(u => {
                        const val = (state.history[u.id] || [])[i];
                        if (val !== null && val !== undefined && !isNaN(val)) {
                            sum += val;
                            has = true;
                        }
                    });
                    return has ? sum : null;
                });
                const gradient = getGradient(gradientPairs.length - 1);
                datasets.push({
                    label: 'Totale stack',
                    data: totalData,
                    borderColor: gradient,
                    backgroundColor: gradient,
                    borderWidth: 3,
                    pointRadius: 0,
                    spanGaps: true,
                    tension: 0.2,
                    fill: false
                });
            }
            state.chart.data.labels = labels;
            state.chart.data.datasets = datasets;
            state.chart.update();
        }

        function renderCards(latestResults) {
            els.cards.innerHTML = '';
            if (!state.utilities.length) {
            els.empty.style.display = 'block';
            return;
        }
        els.empty.style.display = 'none';
        if (!state.selectionInitialized && state.selected.size === 0) {
            state.utilities.forEach(u => state.selected.add(u.id));
            state.selected.add(TOTAL_STACK_ID);
            state.selectionInitialized = true;
        }
        const toggle = (id) => {
            if (state.selected.has(id)) state.selected.delete(id);
            else state.selected.add(id);
            renderCards(latestResults);
                renderChart();
            };
            const appendCard = (id, name, group, locationText, valueText) => {
                const card = document.createElement('div');
                card.className = 'card';
                if (!state.selected.has(id)) card.classList.add('inactive');
                card.onclick = () => toggle(id);
                const title = document.createElement('h3');
                title.textContent = name;
                if (group) {
                    const badge = document.createElement('span');
                    badge.className = 'badge';
                    badge.textContent = group;
                    title.appendChild(badge);
                }
                const location = document.createElement('small');
                location.textContent = locationText;
                const value = document.createElement('div');
                value.className = 'value';
                value.textContent = valueText;
                card.appendChild(title);
                card.appendChild(location);
                card.appendChild(value);
                els.cards.appendChild(card);
            };
            state.utilities.forEach(util => {
                const res = latestResults[util.id];
                const val = res && res.values ? res.values[state.powerRegister?.startAddress] : null;
                appendCard(util.id, util.name, util.group, `C${util.cabinet} - N${util.node}`, formatKw(val));
            });
            // stacked total card
            if (state.utilities.length) {
                let total = null;
                state.utilities.forEach(util => {
                    const res = latestResults[util.id];
                    const val = res && res.values ? res.values[state.powerRegister?.startAddress] : null;
                    if (val !== null && val !== undefined && !isNaN(val)) {
                        total = (total || 0) + val;
                    }
                });
                appendCard(TOTAL_STACK_ID, 'Totale stack', null, 'Somma macchine visibili', formatKw(total));
            }
        }

        function renderGroups(groups) {
            if (!Array.isArray(groups) || !groups.length) return;
            els.groupSelect.innerHTML = '';
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                if (g.toLowerCase() === state.group.toLowerCase()) opt.selected = true;
                els.groupSelect.appendChild(opt);
            });
        }

        function setGroup(newGroup) {
            state.group = newGroup;
            state.timeline = [];
            state.history = {};
            state.selected = new Set();
            state.selectionInitialized = false;
            els.groupLabel.textContent = newGroup;
            requestGroupData();
        }

        function adjustChartHeight() {
            const canvas = document.getElementById('groupChart');
            const card = canvas ? canvas.closest('.chart-card') : null;
            if (!canvas || !card) return;
            const header = card.querySelector('.chart-head');
            const headerH = header ? header.offsetHeight : 50;
            const available = card.clientHeight - headerH - 24; // padding/breathing
            CHART_HEIGHT = Math.max(240, available);
            canvas.height = CHART_HEIGHT;
            canvas.style.height = CHART_HEIGHT + 'px';
            if (state.chart) state.chart.resize();
        }

        els.groupSelect.addEventListener('change', (e) => {
            setGroup(e.target.value);
        });

        function requestGroupData() {
            socket.emit('updateFilters', {
                cabinets: [],
                groups: [state.group],
                minCurrent: 'all',
                onlyErrors: false
            });
        }

        socket.on('connect', () => {
            setStatus('Connected', 'waiting for data...');
            adjustChartHeight();
            requestGroupData();
        });
        socket.on('disconnect', () => setStatus('Disconnected', 'trying to reconnect'));

        socket.on('update', (data) => {
            state.registers = data.registers;
            state.powerRegister = findPowerRegister(data.registers);
            const groups = data.availableFilters?.groups || [];
            const hasGroup = groups.some(g => g.toLowerCase() === state.group.toLowerCase());
            if (!hasGroup && groups.length) {
                setGroup(groups[0]);
            }
            renderGroups(groups);

            state.utilities = (data.utilities || []).filter(u => u.group && u.group.toLowerCase() === state.group.toLowerCase());
            // If we switched group after renderGroups, ensure dropdown reflects it
            if (els.groupSelect.value.toLowerCase() !== state.group.toLowerCase()) {
                els.groupSelect.value = state.group;
            }

            if (!state.powerRegister) {
                setStatus('No power register', 'add a kW/W register to registri.csv');
                return;
            }

            // Keep selected set in sync
            if (!state.selectionInitialized && !state.selected.size) {
                state.utilities.forEach(u => state.selected.add(u.id));
                state.selected.add(TOTAL_STACK_ID);
                state.selectionInitialized = true;
            }
            const ids = state.utilities.map(u => u.id);
            Array.from(state.selected).forEach(id => {
                if (id === TOTAL_STACK_ID) return;
                if (!ids.includes(id)) state.selected.delete(id);
            });

            pushDataForGroup(data.latestResults || {});
            buildChart();
            renderCards(data.latestResults || {});
            renderChart();

            const lastUpdate = new Date().toLocaleTimeString();
            setStatus(`Live - ${state.group}`, `interval ${data.config?.measurement_interval_ms || 0} ms - updated ${lastUpdate}`);
        });

        window.addEventListener('resize', () => {
            adjustChartHeight();
            renderChart();
        });
    </script>
</body>
</html>
